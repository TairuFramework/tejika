packages:
  - packages/*

nodeLinker: hoisted

catalog:
  '@enkaku/client': ^0.18.1
  '@enkaku/http-serve': ^0.18.1
  '@enkaku/protocol': ^0.18.1
  '@enkaku/server': ^0.18.1
  '@enkaku/socket': ^0.18.1
  '@hono/node-server': ^2.0.8
  '@inkjs/ui': ^2.0.0
  '@types/node': ^26.1.0
  '@types/react': ^19.2.17
  commander: ^15.0.0
  env-paths: ^4.0.0
  get-port: ^7.2.0
  hono: ^4.12.26
  ink: ^7.1.0
  ink-testing-library: ^4.0.0
  nano-spawn: ^2.1.0
  react: ^19.2.7
  strip-ansi: ^7.2.0

catalogMode: manual

minimumReleaseAgeExclude:
  - '@enkaku/*'
  - '@kigu/*'
  - '@kokuin/*'
  - '@sozai/*'

supportedArchitectures:
  cpu: [ current ]
  os: [ current ]

allowBuilds:
  '@biomejs/biome': true
  '@swc/core': true
  esbuild: true
  node-pty: true
